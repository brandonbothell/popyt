name: Renovate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '23.x'
    - name: Lint
      uses: borales/actions-yarn@v5
      with:
        cmd: lint
    - name: Build
      uses: borales/actions-yarn@v5
      with:
        cmd: build
    - name: Test build of documentation
      uses: borales/actions-yarn@v5
      with:
        cmd: docs:build
    - name: Run unit tests
      uses: borales/actions-yarn@v5
      with:
        cmd: test
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
